<header class="main-header">
  <div class="header-side header-side--left">
    <!-- HAMBURGUESA -->
    <button
      type="button"
      class="menu-toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Abrir menú"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="header-center">
    <a [routerLink]="['/']" fragment="hero" class="logo" aria-label="Ir al inicio">
      <img
        src="assets/images/logo-jassy.png"
        alt="Jassy Ojeda"
        class="logo-image"
      >
    </a>
  </div>

  <div class="header-side header-side--right">
    <!-- REDES -->
    <div class="header-socials">
      <a
        href="https://www.instagram.com/jassy__ojeda/"
        target="_blank"
        rel="noopener noreferrer"
        class="social-icon"
        aria-label="Instagram"
      >
        <img src="assets/images/instagram.svg" class="social-icon-img">
      </a>

      <a
        href="https://open.spotify.com/intl-es/artist/6Iv6qiJGXQilJkBitIT5us"
        target="_blank"
        rel="noopener noreferrer"
        class="social-icon"
        aria-label="Spotify"
      >
        <img src="assets/images/spotify.svg" class="social-icon-img">
      </a>
    </div>
  </div>
</header>

<!-- OVERLAY -->
<div
  class="menu-overlay"
  [class.is-open]="menuOpen"
  (click)="closeMenu()"
></div>

<!-- PANEL LATERAL -->
<aside class="side-panel" [class.is-open]="menuOpen">
  <div class="side-panel-header">
    <button
      type="button"
      class="close-btn"
      (click)="closeMenu()"
      aria-label="Cerrar menú"
    >
      ✕
    </button>
  </div>

  <nav class="side-nav">
    <ul class="side-nav-list">
      <li class="side-nav-item">
        <a [routerLink]="['/']" fragment="conciertos" class="side-nav-link" (click)="closeMenu()">
          Conciertos
        </a>
      </li>

      <li class="side-nav-item">
        <a [routerLink]="['/']" fragment="bio" class="side-nav-link" (click)="closeMenu()">
          Sobre mí
        </a>
      </li>

      <li class="side-nav-item">
        <a routerLink="/videos" class="side-nav-link" (click)="closeMenu()">
          Vídeos
        </a>
      </li>

      <li class="side-nav-item">
        <a routerLink="/contacto" class="side-nav-link" (click)="closeMenu()">
          Contacto
        </a>
      </li>

      <li class="side-nav-item side-nav-item--group">
        <span class="side-nav-title">Proyectos</span>

        <ul class="side-subnav">
          <li>
            <a
              routerLink="/album/coleccion-de-suenos"
              class="side-subnav-link"
              (click)="closeMenu()"
            >
              Colección de Sueños
            </a>
          </li>

          <li>
            <a
              routerLink="/album/se-fue-el-verano"
              class="side-subnav-link"
              (click)="closeMenu()"
            >
              Se Fue El Verano
            </a>
          </li>
        </ul>
      </li>
    </ul>
  </nav>
</aside>
