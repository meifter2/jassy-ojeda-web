<div class="contacto-section">
  <div class="contacto-card">
    <div class="header-text">
      <h1>CONTACTO</h1>
      <div class="line"></div>
      <p>Cuéntame tus ideas, proyectos o simplemente saluda.</p>
    </div>

    <form class="contacto-form" (submit)="sendEmail($event)">
      <div class="row">
        <input type="text" name="from_name" placeholder="Nombre completo" required>
      </div>
      
      <input type="email" name="user_email" placeholder="Tu correo electrónico" required>
      <input type="text" name="subject" placeholder="Asunto del mensaje">
      
      <textarea name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

      <button type="submit" class="btn-enviar">ENVIAR MÁGIA ✨</button>
    </form>
  </div>
</div>
